# mergelens 配置示例 —— 复制为仓库根目录的 .ai-review.yml
# 密钥一律走环境变量，不要写进这个文件

gitlab:
  url: https://gitlab.example.com     # 也可用 GITLAB_URL 环境变量覆盖

ai:
  provider: anthropic                 # anthropic / openai / deepseek / ollama
  model: claude-sonnet-5
  fallback: claude-haiku-4-5          # 主模型失败时自动降级
  light_model: claude-haiku-4-5       # 反驳验证、判重等轻量任务
  temperature: 0.2
  # base_url: http://localhost:11434/v1   # ollama 或自建网关时使用

review:
  max_diff_lines: 3000                # 超出后按文件大小优先，其余跳过
  max_comments: 8                     # 每个 MR 最多行内评论数（降噪）
  min_confidence: 70                  # 低于此置信度的发现直接丢弃
  verify: true                        # 反驳验证：先质疑再发布，减少误报
  incremental: true                   # 增量审查：push 新提交只审新增 diff，已审过的 sha 直接跳过
  auto_summary_lines: 400             # 全量审查 diff 超过该行数自动生成 MR 摘要（0=关）
  vote: off                           # approve：审查通过自动点 approve、不通过撤销
  daily_token_budget: 0               # 每日 token 预算（输入+输出，0=不限），超出后跳过审查
  redact_patterns: []                 # 发给 LLM 前脱敏的正则，如 ["10\\.\\d+\\.\\d+\\.\\d+", "internal\\.corp\\.com"]
  severity_gate: serious              # 达到该级别 → 总评判定"建议修复后合并"；off 关闭
  language: 简体中文
  ignore_paths:
    - "*.lock"
    - "package-lock.json"
    - "dist/**"
    - "*.min.js"
    - "vendor/**"

skills:
  enabled: all                        # 或列表：[correctness, security]

assistant:
  trigger: "@ai"                      # 评论区唤起机器人的触发词（项目 token 的 bot 用户 @ 不出来，用它）

notify:
  on: needs-work                      # all=每次都推 / needs-work=只推有阻塞问题的 / off
  # 渠道通过环境变量启用（URL 含密钥，不放这里）：
  #   DINGTALK_WEBHOOK=https://oapi.dingtalk.com/robot/send?access_token=xxx
  #   DINGTALK_SECRET=SECxxx          # 机器人安全设置选了「加签」才需要
  #   WECOM_WEBHOOK=https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx
